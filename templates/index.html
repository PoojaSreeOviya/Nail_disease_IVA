<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nail Disease Prediction</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center text-success mb-4">Nail Disease Prediction</h1>
        <div class="card p-4 shadow-sm">
            <form method="POST" enctype="multipart/form-data">
                <div class="mb-3">
                    <label for="formFile" class="form-label">Upload an Image of Your Nail</label>
                    <input class="form-control" type="file" id="formFile" name="file" accept="image/*" required>
                </div>
                <button type="submit" class="btn btn-primary">Predict</button>
            </form>
            {% if prediction %}
            <hr>
            <div class="result mt-4">
                <h3>Prediction: <span class="text-warning">{{ prediction }}</span></h3>
                <h4>Confidence: {{ confidence | round(2) }}%</h4>
                <img src="{{ url_for('static', filename='uploaded_image.png') }}" alt="Uploaded Image" class="img-thumbnail mt-3" width="300">
            </div>
            {% endif %}
        </div>
    </div>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
